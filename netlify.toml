[build]
  publish   = "."
  functions = "backend/netlify/functions"
  command   = "npm install"
  environment = { SECRETS_SCAN_OMIT_KEYS = "ZILLION_KMS_KEY_ARN" }

[functions]
  node_bundler          = "esbuild"
  external_node_modules = ["@supabase/supabase-js"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"

# ── Redirects ────────────────────────────────────────────────────

[[redirects]]
  from   = "/"
  to     = "/index.html"
  status = 200

[[redirects]]
  from = "/api/v1/issue"
  to   = "/.netlify/functions/issue"
  status = 200

