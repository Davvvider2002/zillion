[build]
  publish   = "."
  functions = "backend/netlify/functions"
  command   = "npm install"

[functions]
  node_bundler          = "esbuild"
  external_node_modules = ["@supabase/supabase-js"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
