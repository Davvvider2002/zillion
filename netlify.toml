[build]
  publish   = "."
  functions = "backend/netlify/functions"
  command   = "echo 'No build step for MVP'"

[functions]
  node_bundler = "esbuild"

# API functions
[[redirects]]
  from   = "/api/v1/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Agent portal — serves frontend/agent-portal/index.html
[[redirects]]
  from   = "/agent"
  to     = "/agent-portal/index.html"
  status = 200

[[redirects]]
  from   = "/agent/*"
  to     = "/agent-portal/:splat"
  status = 200

# Admin dashboard
[[redirects]]
  from   = "/admin"
  to     = "/admin-dashboard/index.html"
  status = 200

[[redirects]]
  from   = "/admin/*"
  to     = "/admin-dashboard/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
