[build]
  publish   = "."
  functions = "backend/netlify/functions"
  command   = "npm install"

[functions]
  node_bundler          = "esbuild"
  external_node_modules = ["@supabase/supabase-js"]

[[redirects]]
  from   = "/api/v1/issue"
  to     = "/.netlify/functions/issue"
  status = 200

[[redirects]]
  from   = "/api/v1/sync"
  to     = "/.netlify/functions/sync"
  status = 200

[[redirects]]
  from   = "/api/v1/redeem"
  to     = "/.netlify/functions/redeem"
  status = 200

[[redirects]]
  from   = "/api/v1/validate"
  to     = "/.netlify/functions/validate"
  status = 200

[[redirects]]
  from   = "/api/v1/agent-token"
  to     = "/.netlify/functions/agent-token"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
