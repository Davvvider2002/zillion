[build]
  publish   = "."
  functions = "backend/netlify/functions"
  command   = "npm install"

[functions]
  node_bundler          = "esbuild"
  external_node_modules = ["@supabase/supabase-js"]

[[redirects]]
  from   = "/wallet"
  to     = "/wallet/index.html"
  status = 200

[[redirects]]
  from   = "/wallet/"
  to     = "/wallet/index.html"
  status = 200

[[redirects]]
  from   = "/api/v1/issue"
  to     = "/.netlify/functions/issue"
  status = 200

[[redirects]]
  from   = "/api/v1/sync"
  to     = "/.netlify/functions/sync"
  status = 200

[[redirects]]
  from   = "/api/v1/redeem"
  to     = "/.netlify/functions/redeem"
  status = 200

[[redirects]]
  from   = "/api/v1/validate"
  to     = "/.netlify/functions/validate"
  status = 200

[[redirects]]
  from   = "/api/v1/agent-token"
  to     = "/.netlify/functions/agent-token"
  status = 200

[[redirects]]
  from   = "/api/v1/agent-login"
  to     = "/.netlify/functions/agent-login"
  status = 200

[[redirects]]
  from   = "/api/v1/agent-statement"
  to     = "/.netlify/functions/agent-statement"
  status = 200

[[redirects]]
  from   = "/api/v1/admin-login"
  to     = "/.netlify/functions/admin-login"
  status = 200

[[redirects]]
  from   = "/api/v1/admin-agents"
  to     = "/.netlify/functions/admin-agents"
  status = 200

[[redirects]]
  from   = "/api/v1/admin-users"
  to     = "/.netlify/functions/admin-users"
  status = 200

[[redirects]]
  from   = "/api/v1/admin-coins"
  to     = "/.netlify/functions/admin-coins"
  status = 200

[[redirects]]
  from   = "/api/v1/admin-transactions"
  to     = "/.netlify/functions/admin-transactions"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[redirects]]
  from   = "/api/v1/send-otp"
  to     = "/.netlify/functions/send-otp"
  status = 200

[[redirects]]
  from   = "/api/v1/verify-otp"
  to     = "/.netlify/functions/verify-otp"
  status = 200
